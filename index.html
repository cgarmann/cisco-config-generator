<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cisco Config Generator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>Cisco Config Generator</h1>
      <p>Generate IOS/IOS-XE configuration snippets using the form below.</p>
    </header>

    <div class="form-grid">

      <!-- Device Settings -->
      <section class="card">
        <h2>Device Settings</h2>

        <label for="deviceType">Device Type</label>
        <select id="deviceType">
          <option value="">-- Select --</option>
          <option value="router">Router</option>
          <option value="switch">Switch (Layer 2)</option>
          <option value="switch_l3">Switch (Layer 3)</option>
          <option value="firewall">ASA Firewall</option>
        </select>

        <label for="hostname">Hostname</label>
        <input type="text" id="hostname" placeholder="e.g. CORE-SW-01" />

        <label for="domain">Domain Name</label>
        <input type="text" id="domain" placeholder="e.g. company.local" />

        <label for="enableSecret">Enable Secret</label>
        <input type="password" id="enableSecret" placeholder="Enable secret password" />
      </section>

      <!-- Interface Settings -->
      <section class="card">
        <h2>Interface Settings</h2>

        <label for="intType">Interface Type</label>
        <select id="intType">
          <option value="">-- Select --</option>
          <option value="GigabitEthernet">GigabitEthernet</option>
          <option value="FastEthernet">FastEthernet</option>
          <option value="TenGigabitEthernet">TenGigabitEthernet</option>
          <option value="Loopback">Loopback</option>
          <option value="Vlan">Vlan</option>
          <option value="Tunnel">Tunnel</option>
        </select>

        <label for="intNumber">Interface Number</label>
        <input type="text" id="intNumber" placeholder="e.g. 0/0 or 1" />

        <label for="intDesc">Description</label>
        <input type="text" id="intDesc" placeholder="e.g. Uplink to Core" />

        <label for="ipAddress">IP Address</label>
        <input type="text" id="ipAddress" placeholder="e.g. 192.168.1.1" />

        <label for="subnetMask">Subnet Mask</label>
        <select id="subnetMask">
          <option value="">-- Select --</option>
          <option value="255.255.255.0">/24 — 255.255.255.0</option>
          <option value="255.255.255.128">/25 — 255.255.255.128</option>
          <option value="255.255.255.192">/26 — 255.255.255.192</option>
          <option value="255.255.255.224">/27 — 255.255.255.224</option>
          <option value="255.255.255.240">/28 — 255.255.255.240</option>
          <option value="255.255.254.0">/23 — 255.255.254.0</option>
          <option value="255.255.252.0">/22 — 255.255.252.0</option>
          <option value="255.255.0.0">/16 — 255.255.0.0</option>
          <option value="255.0.0.0">/8 — 255.0.0.0</option>
        </select>

        <label for="intMode">Port Mode</label>
        <select id="intMode">
          <option value="">-- Select --</option>
          <option value="access">Access</option>
          <option value="trunk">Trunk</option>
          <option value="routed">Routed (no switchport)</option>
        </select>

        <label for="vlanId">VLAN ID (access/trunk)</label>
        <input type="number" id="vlanId" placeholder="e.g. 10" min="1" max="4094" />
      </section>

      <!-- Routing -->
      <section class="card">
        <h2>Routing Protocol</h2>

        <label for="routingProtocol">Protocol</label>
        <select id="routingProtocol">
          <option value="">-- None --</option>
          <option value="static">Static Route</option>
          <option value="ospf">OSPF</option>
          <option value="eigrp">EIGRP</option>
          <option value="bgp">BGP</option>
          <option value="rip">RIP</option>
        </select>

        <div id="staticFields" class="proto-fields hidden">
          <label for="staticDest">Destination Network</label>
          <input type="text" id="staticDest" placeholder="e.g. 0.0.0.0" />
          <label for="staticMask">Destination Mask</label>
          <input type="text" id="staticMask" placeholder="e.g. 0.0.0.0" />
          <label for="staticNext">Next-Hop / Exit Interface</label>
          <input type="text" id="staticNext" placeholder="e.g. 10.0.0.1" />
        </div>

        <div id="ospfFields" class="proto-fields hidden">
          <label for="ospfPid">Process ID</label>
          <input type="number" id="ospfPid" placeholder="e.g. 1" />
          <label for="ospfRouterId">Router ID</label>
          <input type="text" id="ospfRouterId" placeholder="e.g. 1.1.1.1" />
          <label for="ospfNetwork">Network (with wildcard)</label>
          <input type="text" id="ospfNetwork" placeholder="e.g. 192.168.1.0 0.0.0.255" />
          <label for="ospfArea">Area</label>
          <input type="number" id="ospfArea" placeholder="e.g. 0" />
        </div>

        <div id="eigrpFields" class="proto-fields hidden">
          <label for="eigrpAs">AS Number</label>
          <input type="number" id="eigrpAs" placeholder="e.g. 100" />
          <label for="eigrpNetwork">Network</label>
          <input type="text" id="eigrpNetwork" placeholder="e.g. 192.168.1.0" />
        </div>

        <div id="bgpFields" class="proto-fields hidden">
          <label for="bgpAs">Local AS Number</label>
          <input type="number" id="bgpAs" placeholder="e.g. 65001" />
          <label for="bgpNeighbor">Neighbor IP</label>
          <input type="text" id="bgpNeighbor" placeholder="e.g. 10.0.0.2" />
          <label for="bgpNeighborAs">Neighbor AS</label>
          <input type="number" id="bgpNeighborAs" placeholder="e.g. 65002" />
        </div>
      </section>

      <!-- Security -->
      <section class="card">
        <h2>Security &amp; Management</h2>

        <label for="sshVersion">SSH Version</label>
        <select id="sshVersion">
          <option value="">-- None --</option>
          <option value="2">SSHv2</option>
          <option value="1">SSHv1</option>
        </select>

        <label for="syslogServer">Syslog Server IP</label>
        <input type="text" id="syslogServer" placeholder="e.g. 10.0.0.10" />

        <label for="ntpServer">NTP Server IP</label>
        <input type="text" id="ntpServer" placeholder="e.g. 10.0.0.20" />

        <label for="snmpCommunity">SNMP Community (read-only)</label>
        <input type="text" id="snmpCommunity" placeholder="e.g. public" />

        <label for="bannerMotd">Banner MOTD</label>
        <textarea id="bannerMotd" rows="3" placeholder="e.g. Authorized access only."></textarea>
      </section>
    </div>

    <div class="actions">
      <button id="generateBtn">Generate Config</button>
      <button id="clearBtn" class="secondary">Clear</button>
    </div>

    <!-- Output -->
    <section class="card output-card" id="outputSection" style="display:none;">
      <div class="output-header">
        <h2>Generated Configuration</h2>
        <button id="copyBtn">Copy to Clipboard</button>
      </div>
      <pre id="configOutput"></pre>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
